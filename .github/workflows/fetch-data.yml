name: Fetch Music Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual data refresh'

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch YouTube Trending
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/fetch-youtube.js

      - name: Fetch Spotify Charts
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: node scripts/fetch-spotify.js
        continue-on-error: true

      - name: Fetch Deezer Charts
        run: node scripts/fetch-deezer.js
        continue-on-error: true

      - name: Fetch Apple Music Charts
        run: node scripts/fetch-apple-music.js
        continue-on-error: true

      - name: Fetch Shazam Charts
        run: node scripts/fetch-shazam.js
        continue-on-error: true

      - name: Verify data
        run: |
          echo "=== Data Check ==="
          for f in data/charts/*_global.json; do
            TRACKS=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('$f')).total)}catch(e){console.log(0)}")
            echo "  $(basename $f): $TRACKS tracks"
          done

      - name: Generate artist pages
        run: node scripts/generate-artist-pages.js

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build site
        run: hugo --minify

      - name: Commit data updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ content/
          git diff --staged --quiet || git commit -m "chore: update chart data $(date -u +%Y-%m-%d_%H:%M)"
          git push

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './public'
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
