name: Fetch Music Data

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual data refresh'

permissions:
  contents: write

jobs:
  fetch-deezer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Deezer Charts
        run: node scripts/fetch-deezer.js

      - name: Verify Deezer data
        run: |
          echo "=== Deezer data check ==="
          if [ -f data/charts/deezer_global.json ]; then
            TRACKS=$(node -e "console.log(JSON.parse(require('fs').readFileSync('data/charts/deezer_global.json')).tracks.length)")
            echo "deezer_global.json: $TRACKS tracks"
          else
            echo "WARNING: deezer_global.json not found"
          fi

      - name: Upload data artifact
        uses: actions/upload-artifact@v4
        with:
          name: deezer-data
          path: data/
          retention-days: 1

  fetch-apple-music:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Apple Music Charts
        run: node scripts/fetch-apple-music.js

      - name: Verify Apple data
        run: |
          echo "=== Apple Music data check ==="
          if [ -f data/charts/apple_global.json ]; then
            TRACKS=$(node -e "console.log(JSON.parse(require('fs').readFileSync('data/charts/apple_global.json')).tracks.length)")
            echo "apple_global.json: $TRACKS tracks"
          else
            echo "WARNING: apple_global.json not found"
          fi

      - name: Upload data artifact
        uses: actions/upload-artifact@v4
        with:
          name: apple-data
          path: data/
          retention-days: 1

  fetch-spotify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Spotify Charts
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: node scripts/fetch-spotify.js

      - name: Verify Spotify data
        run: |
          echo "=== Spotify data check ==="
          if [ -f data/charts/spotify_global.json ]; then
            TRACKS=$(node -e "console.log(JSON.parse(require('fs').readFileSync('data/charts/spotify_global.json')).tracks.length)")
            echo "spotify_global.json: $TRACKS tracks"
          else
            echo "WARNING: spotify_global.json not found"
          fi

      - name: Upload data artifact
        uses: actions/upload-artifact@v4
        with:
          name: spotify-data
          path: data/
          retention-days: 1

  fetch-youtube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch YouTube Trending
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/fetch-youtube.js

      - name: Upload data artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-data
          path: data/
          retention-days: 1

  build-and-deploy:
    needs: [fetch-deezer, fetch-apple-music, fetch-spotify, fetch-youtube]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all data artifacts
        uses: actions/download-artifact@v4
        with:
          path: data-artifacts/

      - name: Merge data
        run: |
          echo "=== Merging artifacts ==="
          ls -la data-artifacts/
          for dir in data-artifacts/*/; do
            echo "Copying from $dir ..."
            cp -rv "$dir"* data/ 2>&1 | tail -5
          done
          echo ""
          echo "=== Final data/charts/ contents ==="
          ls -la data/charts/ | head -30
          echo ""
          echo "=== Track counts ==="
          for f in data/charts/*_global.json; do
            TRACKS=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$f')).tracks.length)" 2>/dev/null || echo "ERROR")
            echo "  $(basename $f): $TRACKS tracks"
          done

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate artist pages
        run: node scripts/generate-artist-pages.js

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build site
        run: hugo --minify

      - name: Commit data updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ content/
          git diff --staged --quiet || git commit -m "chore: update chart data $(date -u +%Y-%m-%d_%H:%M)"
          git push

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './public'
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
