name: Fetch Music Data

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual data refresh'

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ===== Fetch all data sources sequentially in one job =====

      - name: Fetch Spotify Charts
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: node scripts/fetch-spotify.js
        continue-on-error: true

      - name: Fetch YouTube Trending
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/fetch-youtube.js
        continue-on-error: true

      # ===== Verify data =====
      - name: Verify fetched data
        run: |
          echo "=== Data Verification ==="
          echo ""
          TOTAL_SUCCESS=0
          TOTAL_FAIL=0

          for f in data/charts/*_global.json; do
            TRACKS=$(node -e "try { console.log(JSON.parse(require('fs').readFileSync('$f')).total) } catch(e) { console.log(0) }" 2>/dev/null)
            NAME=$(basename $f)
            if [ "$TRACKS" -gt 0 ] 2>/dev/null; then
              echo "  ✓ $NAME: $TRACKS tracks"
              TOTAL_SUCCESS=$((TOTAL_SUCCESS + 1))
            else
              echo "  ✗ $NAME: NO DATA"
              TOTAL_FAIL=$((TOTAL_FAIL + 1))
            fi
          done

          echo ""
          echo "=== Summary: $TOTAL_SUCCESS success, $TOTAL_FAIL failed ==="

          # Count total chart files with data
          TOTAL_FILES=$(find data/charts -name "*.json" -size +200c | wc -l)
          echo "Total chart files with data: $TOTAL_FILES"

          # At least one platform must have data to proceed
          if [ "$TOTAL_SUCCESS" -eq 0 ]; then
            echo "ERROR: No platform has data. Aborting deployment."
            exit 1
          fi

      # ===== Generate content & build =====
      - name: Generate artist pages
        run: node scripts/generate-artist-pages.js

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build site
        run: hugo --minify

      # ===== Commit & Deploy =====
      - name: Commit data updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ content/
          git diff --staged --quiet || git commit -m "chore: update chart data $(date -u +%Y-%m-%d_%H:%M)"
          git push

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './public'
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
